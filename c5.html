<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5. HUYGENS · FRESNEL</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Noto+Sans+KR:wght@300;400&family=Noto+Sans+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;}
body{color:rgba(255,255,255,0.82);font-family:'Noto Sans KR',sans-serif;font-weight:300;font-size:13px;display:flex;flex-direction:column;}

header{display:flex;align-items:baseline;justify-content:space-between;padding:18px 28px 16px;border-bottom:1px solid #151515;flex-shrink:0;}
.logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;letter-spacing:6px;color:#fff;}
.header-hint{font-size:11px;letter-spacing:2px;opacity:0.3;}

.layout{display:flex;flex:1;min-height:0;}

.canvas-wrap{flex:1;position:relative;min-width:0;}
canvas{display:block;position:absolute;top:0;left:0;}

.overlay-label{position:absolute;font-family:'Noto Sans Mono',monospace;font-size:12px;color:rgba(255,255,255,0.45);letter-spacing:1.5px;pointer-events:none;top:14px;left:16px;}

#legend-box{position:absolute;bottom:16px;right:16px;background:rgba(0,0,0,0.75);border:1px solid #1a1a1a;padding:12px 16px;pointer-events:none;}
.leg-row{display:flex;align-items:center;gap:10px;font-size:11px;letter-spacing:1px;line-height:2.2;opacity:0.75;}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.leg-line{width:18px;height:1px;flex-shrink:0;}

.panel{width:240px;background:#000;border-left:1px solid #151515;overflow-y:auto;flex-shrink:0;padding-bottom:40px;scrollbar-width:thin;scrollbar-color:#1a1a1a transparent;}
.panel::-webkit-scrollbar{width:2px;}
.panel::-webkit-scrollbar-thumb{background:#1a1a1a;}

.sec-head{padding:14px 18px 10px;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.45);border-top:1px solid #0f0f0f;margin-top:4px;}
.sec-head:first-child{border-top:none;margin-top:0;}
.sec-body{padding:2px 18px 12px;}

.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:4px 18px 12px;}
.preset-btn{background:transparent;border:1px solid #2a2a2a;color:rgba(255,255,255,0.55);font-family:'Noto Sans KR',sans-serif;font-size:10px;font-weight:300;padding:8px 6px;cursor:pointer;text-align:center;letter-spacing:0.5px;line-height:1.4;transition:border-color .15s,color .15s;}
.preset-btn:hover{border-color:rgba(255,255,255,0.4);color:rgba(255,255,255,0.85);}
.preset-btn.active{border-color:rgba(255,255,255,0.65);color:#fff;}

.playbar{display:flex;align-items:center;gap:12px;padding:4px 18px 12px;}
.play-btn{width:30px;height:30px;background:transparent;border:1px solid rgba(255,255,255,0.35);color:rgba(255,255,255,0.8);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .15s;}
.play-btn:hover{border-color:#fff;color:#fff;}

.view-row{display:flex;gap:4px;padding:4px 18px 12px;flex-wrap:wrap;}
.view-btn{background:transparent;border:1px solid #2a2a2a;color:rgba(255,255,255,0.45);font-family:'Noto Sans Mono',monospace;font-size:10px;padding:5px 9px;cursor:pointer;letter-spacing:1px;transition:border-color .15s,color .15s;}
.view-btn:hover{border-color:rgba(255,255,255,0.4);color:rgba(255,255,255,0.85);}
.view-btn.active{border-color:rgba(255,255,255,0.6);color:#fff;}

.ctrl-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;gap:8px;}
.ctrl-label{font-size:11px;color:rgba(255,255,255,0.55);letter-spacing:0.5px;}
.ctrl-val{font-family:'Noto Sans Mono',monospace;font-size:11px;color:rgba(255,255,255,0.85);min-width:24px;text-align:right;}

input[type=range]{-webkit-appearance:none;width:100%;height:1px;background:#1e1e1e;outline:none;cursor:pointer;margin-bottom:10px;display:block;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:rgba(255,255,255,0.45);border-radius:50%;transition:background .1s;}
input[type=range]::-webkit-slider-thumb:hover{background:#fff;}
</style>
</head>
<body>

<header>
  <div class="logo">HUYGENS · FRESNEL</div>
  <div class="header-hint">회절 &amp; 간섭 원리</div>
</header>

<div class="layout">
  <div class="canvas-wrap" id="cwrap">
    <canvas id="cv"></canvas>
    <div class="overlay-label">각 슬릿 점은 새로운 파원이 된다</div>
    <div id="legend-box">
      <div class="leg-row"><div class="leg-dot" style="background:rgba(68,170,255,0.9)"></div><span>하위헌스 파원</span></div>
      <div class="leg-row"><div class="leg-line" style="background:rgba(68,170,255,0.5)"></div><span>원형 파면</span></div>
      <div class="leg-row"><div class="leg-dot" style="background:#fff"></div><span>보강 교점</span></div>
      <div class="leg-row"><div class="leg-dot" style="background:rgba(60,200,140,0.9)"></div><span>상쇄 교점</span></div>
    </div>
  </div>

  <div class="panel">
    <div class="sec-head">슬릿 모드</div>
    <div class="preset-grid">
      <button class="preset-btn active" data-mode="single">단일<br>슬릿</button>
      <button class="preset-btn" data-mode="double">이중<br>슬릿</button>
      <button class="preset-btn" data-mode="open">자유<br>파동</button>
    </div>

    <div class="sec-head">Playback</div>
    <div class="playbar">
      <button class="play-btn" id="playBtn">⏸</button>
      <div style="flex:1">
        <div class="ctrl-row" style="margin-bottom:4px">
          <span class="ctrl-label">Speed</span>
          <span class="ctrl-val" id="spd-v">2</span>
        </div>
        <input type="range" id="spd" min="1" max="5" value="2" style="margin-bottom:0">
      </div>
    </div>

    <div class="sec-head">Display</div>
    <div class="view-row">
      <button class="view-btn active" id="btn-field">파동장</button>
      <button class="view-btn active" id="btn-rings">원형파</button>
      <button class="view-btn active" id="btn-pts">교점</button>
    </div>

    <div class="sec-head">파동 매개변수</div>
    <div class="sec-body">
      <div class="ctrl-row"><span class="ctrl-label">파장 (λ)</span><span class="ctrl-val" id="wl-v">32</span></div>
      <input type="range" id="wl" min="20" max="60" value="32" step="1">
      <div class="ctrl-row"><span class="ctrl-label">슬릿 폭</span><span class="ctrl-val" id="sw-v">60</span></div>
      <input type="range" id="sw" min="20" max="150" value="60" step="1">
      <div class="ctrl-row"><span class="ctrl-label">파원 수</span><span class="ctrl-val" id="ns-v">4</span></div>
      <input type="range" id="ns" min="2" max="10" value="4" step="1">
    </div>

    <div class="sec-head">Reset</div>
    <div style="padding:4px 18px 12px;">
      <button class="view-btn" id="btn-reset" style="width:100%;text-align:center;">RESET</button>
    </div>
  </div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const cwrap = document.getElementById('cwrap');
let W = 0, H = 0;

function resize() {
  W = cv.width = cwrap.offsetWidth;
  H = cv.height = cwrap.offsetHeight;
  imgData = null;
}

let wl=32, slitW=60, nSrc=4, speed=2;
let mode='single', paused=false, showField=true, showRings=true, showPts=true;
let t=0, imgData=null;
const STEP=4;
const slitX=()=>Math.round(W*0.38);

function getSources(){
  const sx=slitX(),cy=H/2,s=[];
  if(mode==='open'){for(let i=0;i<nSrc;i++)s.push({x:sx,y:(H/(nSrc+1))*(i+1)});}
  else if(mode==='single'){const n=Math.max(2,nSrc);for(let i=0;i<n;i++)s.push({x:sx,y:cy-slitW/2+(slitW/(n-1))*i});}
  else{const gap=slitW*1.6,n=Math.max(2,nSrc);[cy-gap/2,cy+gap/2].forEach(c=>{for(let i=0;i<n;i++)s.push({x:sx,y:c-slitW/2+(slitW/(n-1))*i});});}
  return s;
}

function amplitude(x,y,tt,srcs){
  let a=0;
  for(const s of srcs){const r=Math.sqrt((x-s.x)**2+(y-s.y)**2);if(r<1)continue;a+=Math.sin((2*Math.PI/wl)*r-tt*speed*0.08)/(1+r*0.012);}
  return a/srcs.length;
}

function drawField(srcs){
  if(!imgData||imgData.width!==W||imgData.height!==H)imgData=ctx.createImageData(W,H);
  const d=imgData.data,sx=slitX();
  for(let y=0;y<H;y+=STEP){for(let x=0;x<W;x+=STEP){
    let v;
    if(x<sx-2){const ph=(2*Math.PI/wl)*x-t*speed*0.08;v=Math.sin(ph)*0.65;}
    else if(x<=sx+2){v=0;}else{v=amplitude(x,y,t,srcs);}
    const c=Math.max(-1,Math.min(1,v));
    let r,g,b,a;
    if(c>=0){r=Math.round(20+c*235);g=Math.round(80+c*120);b=Math.round(200+c*55);a=Math.round((0.12+c*0.88)*255);}
    else{const av=-c;r=Math.round(10+av*20);g=Math.round(20+av*30);b=Math.round(60+av*100);a=Math.round((0.1+av*0.7)*255);}
    for(let dy=0;dy<STEP&&y+dy<H;dy++){for(let dx=0;dx<STEP&&x+dx<W;dx++){const idx=((y+dy)*W+(x+dx))*4;d[idx]=r;d[idx+1]=g;d[idx+2]=b;d[idx+3]=a;}}
  }}
  ctx.putImageData(imgData,0,0);
}

function drawBarrier(){
  const sx=slitX(),cy=H/2;
  ctx.fillStyle='#050510';ctx.strokeStyle='#1a1a2a';ctx.lineWidth=1;
  if(mode==='single'){
    ctx.fillRect(sx-3,0,6,cy-slitW/2);ctx.strokeRect(sx-3,0,6,cy-slitW/2);
    ctx.fillRect(sx-3,cy+slitW/2,6,H-cy-slitW/2);ctx.strokeRect(sx-3,cy+slitW/2,6,H-cy-slitW/2);
  }else if(mode==='double'){
    const gap=slitW*1.6,t1=cy-gap/2-slitW/2,t2=cy-gap/2+slitW/2,t3=cy+gap/2-slitW/2,t4=cy+gap/2+slitW/2;
    [[0,t1],[t2,t3-t2],[t4,H-t4]].forEach(([y,h])=>{ctx.fillRect(sx-3,y,6,h);ctx.strokeRect(sx-3,y,6,h);});
  }
}

function getRadii(){
  const phase0=t*speed*0.08,maxR=Math.max(W,H)*1.2,radii=[];
  for(let offset=0;offset<maxR;offset+=wl){const r=(phase0*wl/(2*Math.PI)+offset)%maxR;if(r>=3)radii.push(r);}
  return radii;
}

function drawRings(srcs){
  if(!showRings)return;
  const radii=getRadii(),maxR=Math.max(W,H)*1.2;
  srcs.forEach(s=>{
    radii.forEach(r=>{
      const fade=Math.max(0,1-r/(maxR*0.7));if(fade<0.02)return;
      [{w:6,a:0.05},{w:2.5,a:0.12},{w:0.8,a:0.26}].forEach(({w,a})=>{
        ctx.beginPath();ctx.arc(s.x,s.y,r,0,Math.PI*2);
        ctx.strokeStyle=`rgba(68,170,255,${(a*fade).toFixed(3)})`;
        ctx.lineWidth=w;ctx.stroke();
      });
    });
  });
}

function circleIntersects(x1,y1,r1,x2,y2,r2){
  const dx=x2-x1,dy=y2-y1,d=Math.sqrt(dx*dx+dy*dy);
  if(d>r1+r2+1.5||d<Math.abs(r1-r2)-1.5||d<0.001)return[];
  const a=(r1*r1-r2*r2+d*d)/(2*d),h2=r1*r1-a*a;
  if(h2<0)return[];
  const h=Math.sqrt(h2),mx=x1+a*dx/d,my=y1+a*dy/d,px=-dy*h/d,py=dx*h/d;
  if(h<0.1)return[[mx,my]];
  return[[mx+px,my+py],[mx-px,my-py]];
}

function drawIntersections(srcs){
  if(!showPts)return;
  const radii=getRadii(),maxR=Math.max(W,H)*1.2,sx=slitX();
  for(let i=0;i<srcs.length;i++){
    for(let j=i+1;j<srcs.length;j++){
      const s1=srcs[i],s2=srcs[j];
      for(const r1 of radii){for(const r2 of radii){
        const pts=circleIntersects(s1.x,s1.y,r1,s2.x,s2.y,r2);if(!pts.length)continue;
        const diff=Math.abs(r1-r2);
        const constructive=(diff%wl<3||diff%wl>wl-3);
        const fade=Math.max(0,1-Math.min(r1,r2)/(maxR*0.58));if(fade<0.04)continue;
        const alpha=Math.min(1,fade*1.6);
        pts.forEach(([px,py])=>{
          if(px<=sx+2||px>=W-52||py<=1||py>=H-1)return;
          if(constructive){
            const grad=ctx.createRadialGradient(px,py,0,px,py,5);
            grad.addColorStop(0,`rgba(255,255,255,${(alpha*0.22).toFixed(3)})`);
            grad.addColorStop(0.5,`rgba(255,255,255,${(alpha*0.1).toFixed(3)})`);
            grad.addColorStop(1,`rgba(255,255,255,0)`);
            ctx.beginPath();ctx.arc(px,py,5,0,Math.PI*2);
            ctx.fillStyle=grad;ctx.fill();
          }else{
            ctx.beginPath();ctx.arc(px,py,2.2,0,Math.PI*2);
            ctx.fillStyle=`rgba(50,200,140,${(alpha*0.85).toFixed(3)})`;ctx.fill();
            ctx.strokeStyle=`rgba(120,255,200,${(alpha*0.3).toFixed(3)})`;ctx.lineWidth=0.6;ctx.stroke();
          }
        });
      }}
    }
  }
}

function drawSources(srcs){
  srcs.forEach((s,i)=>{
    const p=(Math.sin(t*speed*0.08-i*0.35)+1)/2;
    ctx.beginPath();ctx.arc(s.x,s.y,3+p*2.5,0,Math.PI*2);
    ctx.fillStyle=`rgba(68,170,255,${0.55+p*0.45})`;ctx.fill();
    ctx.strokeStyle='rgba(140,210,255,0.8)';ctx.lineWidth=1;ctx.stroke();
  });
}

function drawIntensity(srcs){
  const x0=W-48;
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(x0,0,48,H);
  ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(x0,0,1,H);
  for(let y=2;y<H-2;y+=2){
    let sum=0;for(let tt=0;tt<16;tt++){const a=amplitude(x0-4,y,t-tt*3,srcs);sum+=a*a;}
    const intensity=Math.sqrt(sum/16);
    ctx.fillStyle=`rgba(255,255,255,${Math.min(1,intensity*1.4).toFixed(3)})`;
    ctx.fillRect(x0+2,y,Math.min(42,intensity*120),2);
  }
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.font='9px "Noto Sans Mono",monospace';
  ctx.fillText('I(y)',x0+10,H-8);
}

function draw(){
  if(W===0||H===0)return;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  const srcs=getSources();
  if(showField)drawField(srcs);
  drawBarrier();drawRings(srcs);drawIntersections(srcs);drawSources(srcs);drawIntensity(srcs);
}

function loop(){if(!paused){t++;draw();}requestAnimationFrame(loop);}

// Init after layout is painted
requestAnimationFrame(()=>{
  resize();
  loop();
});

const bind=(id,fn,out)=>{
  document.getElementById(id).addEventListener('input',function(){fn(+this.value);document.getElementById(out).textContent=this.value;});
};
bind('wl',v=>wl=v,'wl-v');
bind('sw',v=>slitW=v,'sw-v');
bind('ns',v=>nSrc=v,'ns-v');
bind('spd',v=>speed=v,'spd-v');

document.getElementById('playBtn').addEventListener('click',function(){paused=!paused;this.textContent=paused?'▶':'⏸';});
document.getElementById('btn-reset').addEventListener('click',()=>t=0);

['field','rings','pts'].forEach(key=>{
  const btn=document.getElementById('btn-'+key);
  const map={field:()=>showField,rings:()=>showRings,pts:()=>showPts};
  const set={field:v=>showField=v,rings:v=>showRings=v,pts:v=>showPts=v};
  btn.addEventListener('click',function(){
    const next=!map[key]();set[key](next);
    this.classList.toggle('active',next);
  });
});

document.querySelectorAll('.preset-btn').forEach(b=>{
  b.addEventListener('click',function(){
    document.querySelectorAll('.preset-btn').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');mode=this.dataset.mode;t=0;
  });
});

window.addEventListener('resize',()=>resize());
</script>
</body>
</html>
